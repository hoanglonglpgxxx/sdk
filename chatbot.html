<div class="window-chatGPT">
  <div class="header padding-h-lg padding-v-sm align-center background-black color-white">
    <div class="header-img">
      <img
        src="{quote(!empty(portal()->chatGPTImg)?href(portal()->chatGPTImg):'/Extra/ChatGPT/images/small-icon.png')}"
        onerror="this.src='/Extra/ChatGPT/images/small-icon.png';"
        alt=""
      />
    </div>
    <div class="header-title padding-h-sm title-md">{'Chat GPT'}</div>
    <div class="header-actions d-flex flex-end">
      <a
        class="padding-2xs title-lg color-white"
        href="javascript:void(0)"
        data-x-service="fullWindow"
        ><i class="vi vi-maximize-open"></i
      ></a>
      <a
        class="padding-2xs title-lg color-white"
        href="javascript:void(0)"
        data-x-service="closeWindow"
        data-target="#chat-GPT{quote(gridModuleParentId)}"
        ><i class="vi vi-x-large"></i
      ></a>
    </div>
  </div>
  <div class="body scroll-container">
    <div class="content" id="loadModuleChatDetail{quote(mid)}" style="position: relative">
      <div
        id="list-message-chat{quote(mid)}"
        class="message-scroller list-message-chat padding-lg"
        data-id="{quote(!empty(roomId) ? roomId : request('roomId'))}"
      >
        <Extra.ChatGPT.itemChat></Extra.ChatGPT.itemChat>
      </div>
    </div>
  </div>
  <div class="footer border-top border-width-base border-gray-lighten">
    <form
      id="form{quote(mid)}"
      class="form{quote(mid)} d-flex message-form flex-column"
      style="flex-direction: column"
    >
      <input type="hidden" name="roomId" value="{!empty(roomId)?quote(roomId):''}" />
      <Extra.ChatGPT.actions></Extra.ChatGPT.actions>
    </form>
  </div>
</div>
